{{- if .Values.context_flow.enabled }}
{{- if .Values.context_flow.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.context_flow.name }}-prisma-migrate
  labels:
    {{- include "context_flow.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.context_flow.name }}-prisma-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.context_flow.name }}-serviceaccount
      imagePullSecrets:
        - name: docker-registry-credentials

      containers:
        - name: prisma-migrate
          image: pheliperocha/home-server:context-flow-api
          imagePullPolicy: Always

          command:
            - sh
            - -c
            - |
              set -e
              echo "Running Prisma migrations..."
              cd apps/api
              ./node_modules/.bin/prisma migrate deploy --schema=./prisma/schema.prisma

          envFrom:
            - secretRef:
                name: context-flow-secrets
{{- end }}
{{- end }}
