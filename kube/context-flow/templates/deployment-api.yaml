{{- if .Values.context_flow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.context_flow.name }}-api
  labels:
    {{- include "context_flow.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.context_flow.name }}-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  replicas: {{ .Values.context_flow.api.replicaCount }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.context_flow.name }}-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.context_flow.name }}-serviceaccount
      imagePullSecrets:
        - name: docker-registry-credentials
      containers:
      - name: {{ .Values.context_flow.name }}-api
        image: {{ .Values.context_flow.api.image }}
        imagePullPolicy: Always
        ports:
          - name: http
            containerPort: {{ .Values.context_flow.port }}
            protocol: TCP
        envFrom:
          - secretRef:
              name: context-flow-secrets
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 10
{{- end }}